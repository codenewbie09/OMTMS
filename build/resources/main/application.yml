spring:
  application:
    name: omtms

  datasource:
    url: jdbc:postgresql://localhost:5432/omtms
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  output:
    ansi:
      enabled: always

logging:
  level:
    com.omtms: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

server:
  port: 8080

jwt:
  secret: omtmsMovieTicketingSystemSecretKey2026VeryLongSecretKeyForJWTTokenGeneration
  expiration: 86400000
